name: Build project website

on:
  push:
    branches: [master, main]
    paths:
      - 'README.md'
      - 'pages/README-Programmer-Edition.md'
      - 'pages/README-Game.md'
      - 'pages/README-2018-2020.md'
      - 'scripts/build-site.js'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build projects.json
        run: node scripts/build-site.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/projects.json
          git diff --cached --quiet || (git commit -m "docs: rebuild projects.json from READMEs" && git push)
