name: Build project website

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'README.md'
      - 'pages/README-Programmer-Edition.md'
      - 'pages/README-Game.md'
      - 'pages/README-2018-2020.md'
      - 'scripts/build-site.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build projects.json
        run: node scripts/build-site.js

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/projects.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: rebuild projects.json from READMEs"
            git pull --rebase origin master
            git push origin master
          fi
